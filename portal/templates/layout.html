{{define "head"}}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>IOSwarm Portal</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      color: #e0e0e0;
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      font-size: 14px;
      line-height: 1.6;
    }
    a { color: #00ff88; text-decoration: none; }
    a:hover { text-decoration: underline; }

    .container { max-width: 720px; margin: 0 auto; padding: 2rem 1rem; }

    header {
      border-bottom: 1px solid #222;
      padding: 1rem 0;
      margin-bottom: 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header .logo { color: #00ff88; font-size: 1.1rem; font-weight: bold; }
    header nav a { margin-left: 1.5rem; color: #888; }
    header nav a:hover { color: #00ff88; }

    h1 { color: #00ff88; font-size: 1.3rem; margin-bottom: 1rem; }
    h2 { color: #ccc; font-size: 1rem; margin-bottom: 0.5rem; }

    .card {
      background: #111;
      border: 1px solid #222;
      border-radius: 6px;
      padding: 1.5rem;
      margin-bottom: 1rem;
    }

    .stat { font-size: 2rem; color: #00ff88; font-weight: bold; }
    .stat-label { color: #666; font-size: 0.85rem; text-transform: uppercase; }

    form { margin: 1rem 0; }
    label { display: block; color: #888; margin-bottom: 0.3rem; font-size: 0.85rem; }
    input[type="text"], input[type="email"], input[type="password"] {
      width: 100%;
      padding: 0.6rem;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 4px;
      color: #e0e0e0;
      font-family: inherit;
      font-size: 14px;
      margin-bottom: 1rem;
    }
    input:focus { outline: none; border-color: #00ff88; }

    button, .btn {
      display: inline-block;
      padding: 0.6rem 1.2rem;
      background: #00ff88;
      color: #0a0a0a;
      border: none;
      border-radius: 4px;
      font-family: inherit;
      font-weight: bold;
      font-size: 14px;
      cursor: pointer;
    }
    button:hover, .btn:hover { background: #00cc6a; }

    .btn-danger {
      background: transparent;
      color: #ff4444;
      border: 1px solid #ff4444;
      padding: 0.3rem 0.8rem;
      font-size: 0.85rem;
    }
    .btn-danger:hover { background: #ff4444; color: #0a0a0a; }

    .error { color: #ff4444; margin-bottom: 1rem; }
    .success {
      background: #0a2a1a;
      border: 1px solid #00ff88;
      border-radius: 4px;
      padding: 1rem;
      margin-bottom: 1rem;
    }

    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; color: #666; font-size: 0.8rem; text-transform: uppercase; padding: 0.5rem 0; border-bottom: 1px solid #222; }
    td { padding: 0.6rem 0; border-bottom: 1px solid #111; }
    .mono { font-family: inherit; color: #00ff88; font-size: 0.85rem; }
    .revoked { color: #666; text-decoration: line-through; }

    .key-display {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 4px;
      padding: 0.6rem;
      word-break: break-all;
      font-size: 0.85rem;
      color: #00ff88;
      cursor: pointer;
    }
    .key-display:hover { border-color: #00ff88; }

    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }

    .footer { margin-top: 3rem; padding-top: 1rem; border-top: 1px solid #222; color: #444; font-size: 0.8rem; }
  </style>
</head>
<body>
<div class="container">
{{end}}

{{define "nav"}}
<header>
  <span class="logo">IOSwarm</span>
  <nav>
    <a href="/dashboard">Dashboard</a>
    <a href="/api-keys">API Keys</a>
    <form method="POST" action="/logout" style="display:inline; margin:0;">
      <button type="submit" style="background:transparent; color:#888; border:none; cursor:pointer; font-family:inherit; font-size:14px; padding:0; margin-left:1.5rem;">Logout</button>
    </form>
  </nav>
</header>
{{end}}

{{define "foot"}}
<div class="footer">IOSwarm Portal</div>
</div>
</body>
</html>
{{end}}
